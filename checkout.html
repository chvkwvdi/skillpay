<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="assets/images/fav__icon.png" type="image/x-icon">

    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        body {
            margin: 0;
            background: #F8FAFC;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
        }

        .checkout-container {
            width: 100%;
            max-width: 414px;
            min-height: 100vh;
            background: white;
            padding: 30px 24px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .summary-box {
            background: #F1F5F9;
            border-radius: 20px;
            padding: 25px;
            margin: 30px 0;
        }

        .pay-now-btn {
            width: 100%;
            background: #2563EB;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }

        .loader-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: 0.4s;
        }

        .loader-logo {
            width: 90px;
            animation: pulse 1.2s infinite;
        }

        .loader-text {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 800;
            color: #2563EB;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        @keyframes pulse {

            0% {
                transform: scale(0.9);
                opacity: 0.5;
            }

            50% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(0.9);
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>

    <div class="checkout-container">
        <h1 style="font-size: 24px; font-weight: 800;">Checkout</h1>
        <p style="color: #64748B; margin-top: 5px;">Securely complete your subscription</p>

        <div class="summary-box">
            <p id="plan-display" style="font-weight: 700; font-size: 16px; color: #1E293B;"></p>
            <h2 id="price-display" style="font-size: 32px; font-weight: 900; color: #2563EB; margin-top: 10px;"></h2>
        </div>

        <button class="pay-now-btn" onclick="payNow()">Complete Payment</button>
        <p style="text-align: center; font-size: 12px; color: #94A3B8; margin-top: 20px;"><i
                class="fa-solid fa-lock"></i> Secured by Paystack</p>
    </div>

    <div class="loader-screen" id="loader">

        <img src="assets/images/fav__icon.png" class="loader-logo">

        <div class="loader-text">
            SkillPay
        </div>

    </div>
    <script>
        const plan = JSON.parse(localStorage.getItem('selectedPlan')) || { name: 'Monthly', price: 31000 };
        document.getElementById('plan-display').innerText = plan.name + ' Subscription';
        document.getElementById('price-display').innerText = '₦' + plan.price.toLocaleString();

        function payNow() {
            const handler = PaystackPop.setup({
                key: 'pk_test_your_real_key_here', // Replace with your real Paystack key
                email: 'user@example.com',
                amount: plan.price * 100,
                currency: 'NGN',
                callback: function (res) { alert('Payment Success! Ref: ' + res.reference); },
                onClose: function () { alert('Payment Cancelled'); }
            });
            handler.openIframe();
        }
        // PAGE LOAD ANIMATION

        window.addEventListener('load', () => {

            setTimeout(() => {

                document.getElementById('loader').style.opacity = '0';

                setTimeout(() => {

                    document.getElementById('loader').style.display = 'none';

                }, 400);

            }, 1500);

        });

        // PAGE TRANSITION ANIMATION

        document.querySelectorAll('a').forEach(link => {

            link.addEventListener('click', function (e) {

                const href = this.getAttribute('href');

                if (href && href !== '#') {

                    e.preventDefault();

                    const loader =
                        document.getElementById('loader');

                    loader.style.display = 'flex';

                    loader.style.opacity = '1';

                    setTimeout(() => {

                        window.location.href = href;

                    }, 700);

                }

            });

        });
    </script>
</body>

</html>
