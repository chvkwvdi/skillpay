<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkillPay | Upgrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="assets/images/fav__icon.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563EB;
            --gradient: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%);
            --text-dark: #0F172A;
            --text-slate: #64748B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #fff;
            overflow-x: hidden;
            width: 100vw;
        }

        /* Full Page Container - No Edge Padding */
        .app-screen {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Nav Header */
        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
        }

        /* Gradient Card - Matches your Photo */
        .promo-card {
            background: var(--gradient);
            margin: 0 20px 30px;
            border-radius: 24px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .promo-card h2 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .promo-card p {
            font-size: 13px;
            opacity: 0.9;
            width: 80%;
        }

        .crown-icon {
            font-size: 35px;
            color: #FFD700;
        }

        /* Plans Section */
        .section-title {
            padding: 0 20px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-slate);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .plan-card {
            margin: 0 20px 12px;
            border: 1.5px solid #E2E8F0;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .plan-card.active {
            border-color: var(--primary);
            background: #F8FAFF;
        }

        .plan-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .price {
            font-size: 18px;
            font-weight: 800;
        }

        .price span {
            font-size: 12px;
            color: var(--text-slate);
            font-weight: 500;
        }

        /* Radio Toggle */
        .radio-outer {
            width: 22px;
            height: 22px;
            border: 2px solid #E2E8F0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plan-card.active .radio-outer {
            border-color: var(--primary);
        }

        .radio-inner {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .plan-card.active .radio-inner {
            background: var(--primary);
        }

        /* Payment Method Link */
        .payment-method {
            margin: 20px 20px;
            padding: 20px;
            border: 1px solid #E2E8F0;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text-dark);
        }

        .payment-method i:first-child {
            color: var(--text-slate);
            font-size: 18px;
        }

        /* Bottom Fixed Button */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px 20px 40px;
            background: white;
            border-top: 1px solid #F1F5F9;
        }

        .pay-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }

        .loader-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: 0.4s;
        }

        .loader-logo {
            width: 90px;
            animation: pulse 1.2s infinite;
        }

        .loader-text {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 800;
            color: #2563EB;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        @keyframes pulse {

            0% {
                transform: scale(0.9);
                opacity: 0.5;
            }

            50% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(0.9);
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div class="app-screen">
        <header class="header">
            <i class="fa-solid fa-arrow-left" onclick="window.history.back()"></i>
            <h1>Upgrade</h1>
        </header>

        <div class="promo-card">
            <div>
                <h2>Go Premium</h2>
                <p>Unlock all features and maximize your earnings instantly.</p>
            </div>
            <i class="fa-solid fa-crown crown-icon"></i>
        </div>

        <h3 class="section-title">Select Plan</h3>

        <div class="plan-card" onclick="setPlan(this, 'Weekly', 4500)">
            <div><span class="plan-name">Weekly Plan</span>
                <p class="price">₦4,500<span>/week</span></p>
            </div>
            <div class="radio-outer">
                <div class="radio-inner"></div>
            </div>
        </div>

        <div class="plan-card active" onclick="setPlan(this, 'Monthly', 31000)">
            <div><span class="plan-name">Monthly Plan</span>
                <p class="price">₦31,000<span>/month</span></p>
            </div>
            <div class="radio-outer">
                <div class="radio-inner"></div>
            </div>
        </div>

        <div class="plan-card" onclick="setPlan(this, 'Yearly', 80000)">
            <div><span class="plan-name">Yearly Plan</span>
                <p class="price">₦80,000<span>/year</span></p>
            </div>
            <div class="radio-outer">
                <div class="radio-inner"></div>
            </div>
        </div>

        <h3 class="section-title">Payment Method</h3>
        <a href="checkout.html" class="payment-method">
            <i class="fa-solid fa-credit-card"></i>
            <span style="font-weight: 700; font-size: 14px;">Pay with Card / Bank Transfer</span>
            <i class="fa-solid fa-chevron-right" style="margin-left: auto; opacity: 0.3;"></i>
        </a>
        <div class="loader-screen" id="loader">

            <img src="assets/images/fav__icon.png" class="loader-logo">

            <div class="loader-text">
                SkillPay
            </div>

        </div>
        <div class="footer">
            <button class="pay-btn" onclick="goToCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        let selectedPlan = { name: 'Monthly', price: 31000 };

        function setPlan(el, name, price) {
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedPlan = { name, price };
            localStorage.setItem('selectedPlan', JSON.stringify(selectedPlan));
        }

        function goToCheckout() {
            localStorage.setItem('selectedPlan', JSON.stringify(selectedPlan));
            window.location.href = 'checkout.html';
        }
        // PAGE LOAD ANIMATION

        window.addEventListener('load', () => {

            setTimeout(() => {

                document.getElementById('loader').style.opacity = '0';

                setTimeout(() => {

                    document.getElementById('loader').style.display = 'none';

                }, 400);

            }, 1500);

        });

        // PAGE TRANSITION ANIMATION

        document.querySelectorAll('a').forEach(link => {

            link.addEventListener('click', function (e) {

                const href = this.getAttribute('href');

                if (href && href !== '#') {

                    e.preventDefault();

                    const loader =
                        document.getElementById('loader');

                    loader.style.display = 'flex';

                    loader.style.opacity = '1';

                    setTimeout(() => {

                        window.location.href = href;

                    }, 700);

                }

            });

        }); function checkInternetConnection() {

            // OFFLINE
            if (!navigator.onLine) {

                document.body.innerHTML = `
        <div style="
            width:100%;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#F8FAFC;
            font-family:'Plus Jakarta Sans',sans-serif;
            padding:20px;
        ">
            <div style="
                width:100%;
                max-width:380px;
                background:#fff;
                padding:35px 25px;
                border-radius:28px;
                text-align:center;
                box-shadow:0 10px 30px rgba(0,0,0,0.05);
            ">

                <div style="
                    width:90px;
                    height:90px;
                    margin:auto;
                    border-radius:50%;
                    background:#EFF6FF;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    margin-bottom:20px;
                ">
                    <i class="fa-solid fa-wifi-slash"
                        style="
                            font-size:40px;
                            color:#2563EB;
                        ">
                    </i>
                </div>

                <h2 style="
                    font-size:24px;
                    font-weight:800;
                    color:#0F172A;
                    margin-bottom:10px;
                ">
                    No Internet Connection
                </h2>

                <p style="
                    font-size:14px;
                    line-height:1.7;
                    color:#64748B;
                    margin-bottom:25px;
                ">
                    Please turn on your mobile data or Wi-Fi
                    to continue using SkillPay.
                </p>

                <button onclick="window.location.reload()"
                    style="
                        width:100%;
                        border:none;
                        background:#2563EB;
                        color:white;
                        padding:16px;
                        border-radius:18px;
                        font-size:15px;
                        font-weight:800;
                        cursor:pointer;
                    ">
                    Retry Connection
                </button>

            </div>
        </div>
        `;
            }
        }

        // Run check immediately
        checkInternetConnection();

        // Detect when internet goes OFF
        window.addEventListener("offline", () => {
            checkInternetConnection();
        });

        // Detect when internet comes back
        window.addEventListener("online", () => {
            window.location.reload();
        });
    </script>
</body>

</html>
