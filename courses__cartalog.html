<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkillPay | Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563EB;
            --dark: #0F172A;
            --slate: #64748B;
            --bg: #F8FAFC;
            --border: #F1F5F9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #F1F5F9;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .header {
            padding: 24px 20px 10px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .search-bar {
            position: relative;
            margin-bottom: 15px;
        }

        .search-bar i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate);
        }

        .search-bar input {
            width: 100%;
            padding: 14px 45px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 14px;
            outline: none;
        }

        .search-bar input:focus {
            border-color: var(--primary);
            background: white;
        }

        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 20px 20px;
            scrollbar-width: none;
        }

        .cat-btn {
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: white;
            color: var(--slate);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .cat-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .course-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 100px;
        }

        .course-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .course-card:active {
            transform: scale(0.97);
            background: var(--bg);
        }

        .thumb {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 14px;
            flex-shrink: 0;
        }

        .course-info h4 {
            font-size: 14px;
            color: var(--dark);
        }

        .course-info p {
            font-size: 11px;
            color: var(--slate);
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-link {
            color: var(--slate);
            font-size: 20px;
            text-decoration: none;
        }

        .nav-link.active {
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header class="header">
            <h1>Courses</h1>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="liveSearch" placeholder="Search 20+ skills...">
            </div>
        </header>

        <div class="categories" id="categoryContainer">
            <button class="cat-btn active">All</button>
            <button class="cat-btn">Design</button>
            <button class="cat-btn">Development</button>
            <button class="cat-btn">Marketing</button>
            <button class="cat-btn">Business</button>
        </div>

        <main class="course-list" id="courseContainer"></main>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i></a>
            <a href="courses.html" class="nav-link active"><i class="fa-solid fa-book"></i></a>
            <a href="earn.html" class="nav-link"><i class="fa-solid fa-sack-dollar"></i></a>
            <a href="wallet.html" class="nav-link"><i class="fa-solid fa-wallet"></i></a>
        </nav>
    </div>

    <script>
        const courses = [
            { title: "Web Development", sub: "Mastering HTML & CSS", cat: "Development", color: "#0F172A", icon: "JS" },
            { title: "Graphic Design", sub: "UI/UX Masterclass", cat: "Design", color: "#2563EB", icon: "UI" },
            { title: "Mobile App Design", sub: "Figma to App UI", cat: "Design", color: "#9333EA", icon: "App" },
            { title: "Video Editing", sub: "Premiere Pro Guide", cat: "Design", color: "#EF4444", icon: "Pro" },
            { title: "Digital Marketing", sub: "Social Media Growth", cat: "Marketing", color: "#10B981", icon: "Ads" },
            { title: "Python for AI", sub: "Machine Learning Basics", cat: "Development", color: "#F59E0B", icon: "Py" },
            { title: "Copywriting", sub: "Write to Convert", cat: "Marketing", color: "#EC4899", icon: "Pen" },
            { title: "Project Mgmt", sub: "Agile & Scrum Basics", cat: "Business", color: "#6366F1", icon: "PM" },
            { title: "Data Science", sub: "Analytics & SQL", cat: "Business", color: "#14B8A6", icon: "DB" },
            { title: "SEO Strategy", sub: "Rank #1 on Google", cat: "Marketing", color: "#8B5CF6", icon: "SEO" }
        ];

        function renderCourses(filter = "All", query = "") {
            const container = document.getElementById('courseContainer');
            const filtered = courses.filter(c =>
                (filter === "All" || c.cat === filter) &&
                (c.title.toLowerCase().includes(query.toLowerCase()))
            );

            container.innerHTML = filtered.map(c => `
                <div class="course-card" onclick="location.href='course-details.html?title=${encodeURIComponent(c.title)}&cat=${encodeURIComponent(c.cat)}&color=${encodeURIComponent(c.color)}'">
                    <div class="thumb" style="background: ${c.color}">${c.icon}</div>
                    <div class="course-info">
                        <h4>${c.title}</h4>
                        <p>${c.sub}</p>
                    </div>
                </div>
            `).join('');
        }

        // Live Search
        document.getElementById('liveSearch').addEventListener('input', (e) => {
            const activeCat = document.querySelector('.cat-btn.active').innerText;
            renderCourses(activeCat, e.target.value);
        });

        // Filter Toggle
        document.getElementById('categoryContainer').addEventListener('click', (e) => {
            if (e.target.classList.contains('cat-btn')) {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderCourses(e.target.innerText, document.getElementById('liveSearch').value);
            }
        });

        renderCourses();
    </script>
</body>

</html>
